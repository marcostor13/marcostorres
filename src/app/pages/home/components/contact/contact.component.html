<section class="py-24 bg-primary-dark text-white relative overflow-hidden">
  <!-- Gradient Background -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-3xl h-full bg-gradient-to-b from-primary-neonCyan/5 to-transparent pointer-events-none"></div>

  <div class="container mx-auto px-4 max-w-4xl relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-bold mb-6">¿Listo para dejar de competir y <span class="text-primary-neonCyan">empezar a dominar?</span></h2>
      <p class="text-gray-400">Cuéntanos tu desafío. Nosotros ponemos la arquitectura.</p>
    </div>

    <form class="bg-zinc-900/80 p-8 md:p-12 rounded-3xl border border-white/10 backdrop-blur-xl space-y-8 shadow-2xl relative overflow-hidden group">
        <!-- Shine Effect -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-neonCyan to-transparent opacity-50 group-hover:opacity-100 transition-opacity"></div>

      <div class="grid md:grid-cols-2 gap-8">
        <div class="space-y-2">
          <label class="block text-primary-neonCyan mb-2 font-mono text-xs tracking-widest font-bold">¿QUIÉN ERES?</label>
          <div class="relative">
            <select class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-4 text-white focus:border-primary-neonCyan focus:ring-1 focus:ring-primary-neonCyan outline-none transition-all appearance-none cursor-pointer hover:bg-black/70">
              <option>Soy Programador</option>
              <option>Soy Empresa</option>
            </select>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-500">▼</div>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-primary-neonCyan mb-2 font-mono text-xs tracking-widest font-bold">¿QUÉ BUSCAS?</label>
          <div class="relative">
            <select class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-4 text-white focus:border-primary-neonCyan focus:ring-1 focus:ring-primary-neonCyan outline-none transition-all appearance-none cursor-pointer hover:bg-black/70">
              <option>Desarrollo Web</option>
              <option>Soluciones IA</option>
              <option>Capacitación</option>
            </select>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-500">▼</div>
          </div>
        </div>
      </div>
      
      <div class="space-y-2">
        <label class="block text-primary-neonCyan mb-2 font-mono text-xs tracking-widest font-bold">TU RETO EN UNA FRASE</label>
        <textarea rows="4" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-4 text-white focus:border-primary-neonCyan focus:ring-1 focus:ring-primary-neonCyan outline-none transition-all resize-none hover:bg-black/70" placeholder="Ej: Necesito automatizar la atención al cliente para reducir tiempos de respuesta..."></textarea>
      </div>

      <button class="w-full py-5 bg-gradient-to-r from-primary-neonCyan to-blue-600 text-black font-bold text-lg rounded-xl hover:shadow-[0_0_30px_rgba(0,243,255,0.4)] hover:scale-[1.01] transition-all duration-300 uppercase tracking-widest relative overflow-hidden">
        <span class="relative z-10">Enviar Mensaje Inteligente</span>
      </button>
    </form>
  </div>
</section>
