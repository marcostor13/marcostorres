# Netlify Configuration - Marcos Torres
# https://docs.netlify.com/build/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist/marcostorres/browser"
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "20"
    NPM_FLAGS = "--legacy-peer-deps"

# Desarrollo local: npm run dev:netlify → IMPORTANTE: abre http://localhost:4200 (NO 8888)
# El puerto 8888 solo sirve para las funciones API; si abres 8888 verás errores de Vite.
[dev]
  command = "ng serve --proxy-config proxy.conf.json"
  targetPort = 4200
  port = 8888

# API: /api/* → Netlify Functions (auth unificado en una función para evitar "Cannot POST")
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/api-auth?path=:splat"
  status = 200
  force = true
[[redirects]]
  from = "/api/whatsapp-accounts"
  to = "/.netlify/functions/whatsapp-accounts"
  status = 200
  force = true
[[redirects]]
  from = "/api/whatsapp-webhook"
  to = "/.netlify/functions/whatsapp-webhook"
  status = 200
  force = true
[[redirects]]
  from = "/api/whatsapp-send"
  to = "/.netlify/functions/whatsapp-send"
  status = 200
  force = true
[[redirects]]
  from = "/api/whatsapp-templates"
  to = "/.netlify/functions/whatsapp-templates"
  status = 200
  force = true
[[redirects]]
  from = "/api/whatsapp-messages"
  to = "/.netlify/functions/whatsapp-messages"
  status = 200
  force = true
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA: todas las rutas no estáticas van a index.html para que Angular Router las maneje
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad y caché
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
